<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>

<title>For Jessy 💕</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    overflow-x:hidden;
    color:white;
    background:black;
}

/* 🌌 STAR SKY */
.stars{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    z-index:-2;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation: twinkle 2s infinite ease-in-out;
}

@keyframes twinkle{
    0%,100%{opacity:0.2;}
    50%{opacity:1;}
}

/* 🎬 INTRO CINEMATIC */
#intro{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:2rem;
    letter-spacing:2px;
    z-index:99999;
    animation: fadeIntro 3s forwards;
}

@keyframes fadeIntro{
    0%{opacity:1;}
    70%{opacity:1;}
    100%{opacity:0; display:none;}
}

/* SCREEN */
.screen{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:20px;
}

/* BUTTON */
button{
    margin-top:20px;
    padding:16px 40px;
    border:none;
    border-radius:999px;
    background:white;
    color:#ff3d8d;
    font-weight:600;
    font-size:1.1rem;
}

/* 🎁 INTRO */
#giftIntro{
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    font-size:7rem;
    z-index:9999;
    animation: pop 1.2s ease forwards;
}

@keyframes pop{
    0%{transform:scale(0.4);opacity:0;}
    50%{transform:scale(1.5);opacity:1;}
    100%{transform:scale(1);opacity:0;}
}

/* CONTENT */
#content{
    display:none;
    padding:60px 15px;
}

.card{
    max-width:900px;
    margin:auto;
    background:rgba(20,10,25,0.6);
    backdrop-filter:blur(25px);
    border-radius:30px;
    padding:35px;
}

/* 💌 HEARTBEAT TEXT EFFECT */
.text{
    font-size:1.05rem;
    line-height:2;
    white-space:pre-wrap;
    animation: heartbeat 3s infinite ease-in-out;
}

@keyframes heartbeat{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.01);}
}

.title{
    text-align:center;
    font-size:2.2rem;
    color:#ffd1ea;
    margin-bottom:25px;
}

.signature{
    margin-top:40px;
    text-align:center;
    font-weight:600;
    color:#ffd1ea;
}

</style>
</head>

<body>

<!-- 🌌 STARS -->
<div class="stars" id="stars"></div>

<!-- 🎬 INTRO -->
<div id="intro">A small moment... for someone special 💕</div>

<!-- START -->
<div class="screen" id="start">
    <h1>For Jessy 💕</h1>
    <button onclick="startAll()">Open your gift 🎁</button>
</div>

<!-- 🎁 -->
<div id="giftIntro">🎁</div>

<!-- CONTENT -->
<div id="content">

<div class="card">

<div class="title">Happy Birthday Jessyyyyy 🥳🎁💕</div>

<div class="text" id="text"></div>

<div class="signature">Mit ganz viel Liebe — Dylan 💕</div>

</div>

</div>

<script>

/* 🌌 CREATE STARS */
function createStars(){
    const sky=document.getElementById("stars");
    for(let i=0;i<120;i++){
        const s=document.createElement("div");
        s.classList.add("star");
        s.style.left=Math.random()*100+"vw";
        s.style.top=Math.random()*100+"vh";
        s.style.animationDuration=(Math.random()*3+2)+"s";
        sky.appendChild(s);
    }
}
createStars();

/* 🎬 FLOW */
function startAll(){

    document.getElementById("start").style.display="none";

    /* intro cinematic */
    setTimeout(()=>{

        document.getElementById("intro").style.display="none";
        document.getElementById("giftIntro").style.display="flex";

        setTimeout(()=>{
            document.getElementById("giftIntro").style.display="none";
            document.getElementById("content").style.display="block";

            typeWriter();

        },1200);

    },3000);
}

/* TYPEWRITER */
let i=0;
function typeWriter(){
    const el=document.getElementById("text");

    function write(){
        if(i<fullText.length){
            el.innerHTML+=fullText.charAt(i);
            i++;
            setTimeout(write,28);
        }
    }
    write();
}

</script>

</body>
</html>
